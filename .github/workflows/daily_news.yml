name: Daily News Collector

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 버튼 눌러서 즉시 실행 가능하게 설정

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 최상단에 있는 requirements.txt를 바로 설치합니다.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run news collector
        env:
          # 알려주신 .env 항목들을 깃허브 Secrets와 1:1로 매칭
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # 파이썬이 backend 폴더 내부의 모듈을 찾을 수 있게 경로 지정
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
        run: |
          # 루트 폴더 기준으로 실행 경로 지정
          python -m backend.services.news_collector