name: Daily News Collector

on:
  schedule:
    # 매일 한국 시간 오전 8시 (UTC 23:00)에 실행
    - cron: '0 23 * * *'
  workflow_dispatch: # 직접 버튼 눌러서 실행하고 싶을 때 사용

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run news collector
        env:
          # 1단계에서 등록한 비밀 키들을 파이썬이 읽을 수 있게 연결
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}/backend # 경로 문제 해결
        run: |
          python -m backend.services.news_collector